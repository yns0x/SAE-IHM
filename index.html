<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jeu de Memory</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/chaos.css">
  <script src="js/app.js" type="module"></script>
  <script src="js/Thememanager.js" type="module"></script>
</head>
<body>
<header><h1>Jeu de Memory</h1></header>

<div class="setup-form">
  <h2>Démarrer une nouvelle partie</h2>
    <form class="game-form">
        <div>
            <label for="pseudo">Nom du joueur</label>
            <input type="text" id="pseudo" name="pseudo" placeholder="Entrez votre pseudo" required>
        </div>
        <div>
            <label for="difficulty">Mode de jeu</label>
            <select id="difficulty" name="difficulty">
            <!-- Modes classiques -->
            <optgroup label="Classique">
                <option value="classic-4">Facile</option>
                <option value="classic-5">Moyen</option>
                <option value="classic-6">Difficile</option>
                <option value="classic-8">Expert</option>
            </optgroup>

            <!-- Modes spéciaux -->
            <optgroup label="Modes spéciaux">
                <option value="time_attack-8">Contre La Montre</option>
                <option value="shuffle-8">Shuffle</option>
                <option value="chaos-8">Mode Chaos</option>
            </optgroup>
            </select>
        </div>
        <div>
            <label for="collection">Collection d'images</label>
            <select id="collection" name="collection">
                <option value="animals">Animaux</option>
                <option value="fruits">Fruits</option>
                <option value="cars">Voitures</option>
            </select>
        </div>
        <button type="submit">Démarrer la partie</button>
    </form>
</div>
<div class="game-area hidden">
  <div class="game-area-header">
      <h2 id="player-name"></h2>
      <span class="game-timer"><strong>00:00</strong></span>
      <button id="abandon">Abandonner</button>
  </div>
  <div class="game-board"></div>
</div>
</body>
</html>
